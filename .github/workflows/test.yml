name: Tests

on:
  push:
    branches: [main, experiment]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest tests/ --ignore=tests/test_decoder_site.py -q

      - name: Verify package imports without optional deps
        run: |
          pip install --no-deps -e .
          python -c "from mememage.core import compute_content_hash; print('zero-dep import OK')"
