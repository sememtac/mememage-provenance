name: Tests

on:
  push:
    branches: [main, experiment]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      # One red cell shouldn't cancel the other seven — a version-specific
      # break is invisible when fail-fast hides it behind "cancelled".
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      # The dev extra installs the playwright PACKAGE but not its browser
      # binary, so the four browser-driven suites (dashboard, validator
      # forensics/observatory, decoder site) errored at setup on every runner —
      # both repos' CI had been red since at least 2026-07-06 for this reason
      # alone. Only chromium is needed; the download is cached per runner image.
      - name: Install Playwright browser
        run: |
          python -m playwright install --with-deps chromium

      - name: Run tests
        run: |
          pytest tests/ --ignore=tests/test_decoder_site.py -q

      - name: Verify package imports without optional deps
        run: |
          pip install --no-deps -e .
          python -c "from mememage.core import compute_content_hash; print('zero-dep import OK')"
